        // 加载测试用例
        async function loadTestCases() {
            if (!selectedFunctionalProject) {
                renderModuleTree();
                renderTestCases([]);
                return;
            }
            
            const androidChecked = document.getElementById('platform-android-check').checked;
            const iosChecked = document.getElementById('platform-ios-check').checked;
            const androidDevice = document.getElementById('functional-device-android').value;
            const iosDevice = document.getElementById('functional-device-ios').value;
            
            // 检查是否至少有一个平台被选中且有设备
            if (!androidChecked && !iosChecked) {
                renderModuleTree();
                renderTestCases([]);
                return;
            }
            
            const selectedPlatform = (androidChecked && androidDevice) ? 'android' : ((iosChecked && iosDevice) ? 'ios' : null);
            
            if (!selectedPlatform) {
                renderModuleTree();
                renderTestCases([]);
                return;
            }
            
            try {
                const response = await fetch(`/api/functional/testcases/${selectedFunctionalProject}`);
                const data = await response.json();
                if (data.error) {
                    showFunctionalAlert('加载测试用例失败: ' + data.error, 'error');
                    return;
                }
                
                testCasesData = data;
                allTestCases = [];
                
                if (selectedPlatform && data.modules) {
                    for (const [moduleName, platforms] of Object.entries(data.modules)) {
                        const cases = platforms[selectedPlatform] || [];
                        allTestCases.push(...cases.map(c => ({...c, module: moduleName})));
                    }
                }
                
                renderModuleTree();
                renderTestCases(allTestCases);
            } catch (error) {
                showFunctionalAlert('加载测试用例失败: ' + error.message, 'error');
            }
        }

        // 渲染模块树
        function renderModuleTree() {
            const container = document.getElementById('module-tree-container');
            
            const androidChecked = document.getElementById('platform-android-check').checked;
            const iosChecked = document.getElementById('platform-ios-check').checked;
            const androidDevice = document.getElementById('functional-device-android').value;
            const iosDevice = document.getElementById('functional-device-ios').value;
            
            if (!testCasesData || !testCasesData.modules) {
                if (!androidChecked && !iosChecked) {
                    container.innerHTML = '<div style="padding: 10px 15px; color: #999; text-align: center;">请先勾选平台</div>';
                } else {
                    container.innerHTML = '<div style="padding: 10px 15px; color: #999; text-align: center;">请先选择项目和设备</div>';
                }
                return;
            }
            
            const selectedPlatform = (androidChecked && androidDevice) ? 'android' : ((iosChecked && iosDevice) ? 'ios' : null);
            
            if (!selectedPlatform) {
                container.innerHTML = '<div style="padding: 10px 15px; color: #999; text-align: center;">请先选择设备</div>';
                return;
            }
            
            // 计算总数与模块/平台层级结构
            let totalCount = 0;
            const moduleList = [];
            for (const [moduleName, platforms] of Object.entries(testCasesData.modules)) {
                const androidCases = (platforms['android'] || []).length;
                const iosCases = (platforms['ios'] || []).length;
                const moduleCount = androidCases + iosCases;
                totalCount += moduleCount;
                moduleList.push({
                    name: moduleName,
                    total: moduleCount,
                    android: androidCases,
                    ios: iosCases
                });
            }
            
            // 渲染全部用例和模块->平台列表（默认收起）
            container.innerHTML = `
                <div class="module-tree-item ${!selectedModule ? 'active' : ''}" onclick="toggleAllCases()">
                    <span class="arrow">▶</span>
                    <span>全部用例</span>
                    <span class="count">(${totalCount})</span>
                </div>
                <div class="module-tree-children" id="module-children" style="display: none;">
                    ${moduleList.map(module => `
                        <div class="module-tree-item module-parent" data-module="${module.name}" onclick="toggleModulePlatforms('${module.name}', event)">
                            <span class="arrow">▶</span>
                            <span>${module.name}</span>
                            <span class="count">(${module.total})</span>
                        </div>
                        <div class="module-tree-children module-platforms" id="module-platforms-${module.name}" style="display: none;">
                            <div class="module-tree-item module-platform ${selectedModule === module.name + '-android' ? 'active' : ''}" data-module="${module.name}" data-platform="android" onclick="selectModulePlatform('${module.name}','android', event)">
                                <span>安卓</span>
                                <span class="count">(${module.android})</span>
                            </div>
                            <div class="module-tree-item module-platform ${selectedModule === module.name + '-ios' ? 'active' : ''}" data-module="${module.name}" data-platform="ios" onclick="selectModulePlatform('${module.name}','ios', event)">
                                <span>IOS</span>
                                <span class="count">(${module.ios})</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // 默认选中全部用例并显示
            if (!selectedModule) {
                selectModule(null);
            }
        }

        // 切换全部用例展开/收起
        function toggleAllCases() {
            const allItem = document.querySelector('#module-tree-container .module-tree-item');
            const children = document.getElementById('module-children');
            
            if (allItem && children) {
                allItem.classList.toggle('expanded');
                if (allItem.classList.contains('expanded')) {
                    children.style.display = 'block';
                } else {
                    children.style.display = 'none';
                }
            }
            
            // 选择全部用例
            selectModule(null);
        }

        // 选择模块（全部用例或仅按模块名，不区分平台）
        function selectModule(moduleName, event) {
            if (event) {
                event.stopPropagation();
            }
            
            selectedModule = moduleName;
            
            // 更新选中状态
            document.querySelectorAll('.module-tree-item').forEach(item => {
                item.classList.remove('active');

            if (moduleName === null) {

        // 选择具体 模块 + 平台
        function selectModulePlatform(moduleName, platform, event) {
            if (event) {
                event.stopPropagation();
            }

            selectedModule = `${moduleName}-${platform}`;

            document.querySelectorAll('.module-tree-item').forEach(item => {

        // 测试用例分页相关变量
        let currentTestCases = [];
        const testcasePageSize = 10;
        let testcaseCurrentPage = 1;

        // 渲染测试用例列表（带分页）
        function renderTestCases(cases, resetPage = true) {
            currentTestCases = cases || [];
            if (resetPage) {
                testcaseCurrentPage = 1;
                // 切换用例列表时，清空跨页选中状态（除非是分页切换）
                selectedTestcaseIds.clear();
            }
            renderPagedTestCases();

        // 按当前页渲染用例表格和分页信息
        function renderPagedTestCases() {
            const tbody = document.getElementById('testcase-table-body');
            const total = currentTestCases.length;
            const totalPages = total === 0 ? 1 : Math.ceil(total / testcasePageSize);
            if (testcaseCurrentPage > totalPages) {
                testcaseCurrentPage = totalPages;
            }

            if (total === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" style="padding: 40px; text-align: center; color: #999;">
                            暂无测试用例
                        </td>
                    </tr>
                `;
            } else {
                const start = (testcaseCurrentPage - 1) * testcasePageSize;
                const pageCases = currentTestCases.slice(start, start + testcasePageSize);
                tbody.innerHTML = pageCases.map(testcase => {
                    const isSelected = selectedTestcaseIds.has(String(testcase.id));
                    const steps = testcase.steps || '暂无操作步骤（可在脚本中补充）';
                    const expected = testcase.expected || '暂无期望结果（可在脚本中补充）';
                    return `
                    <tr onclick="toggleTestcaseDetail('${testcase.id}', event)">
                        <td>
                            <input type="checkbox" class="testcase-checkbox" data-id="${testcase.id}" data-module="${testcase.module || ''}" 
                                   ${isSelected ? 'checked' : ''} onchange="onTestcaseCheckboxChange(this); event.stopPropagation();">
                        </td>
                        <td>${testcase.id}</td>
                        <td>${testcase.name}</td>
                    </tr>
                    <tr id="testcase-detail-${testcase.id}" class="testcase-detail-row" style="display: none;">
                        <td></td>
                        <td colspan="2" style="padding: 12px 15px; background: #f9f9f9;">
                            <div style="margin-bottom: 8px;"><strong>操作步骤：</strong></div>
                            <div style="white-space: pre-wrap; font-size: 12px; color: #555; line-height: 1.6; margin-bottom: 12px;">${steps || '暂无操作步骤（可在脚本中补充）'}</div>
                            <div style="margin-bottom: 8px;"><strong>期望结果：</strong></div>
                            <div style="white-space: pre-wrap; font-size: 12px; color: #555; line-height: 1.6;">${expected || '暂无期望结果（可在脚本中补充）'}</div>
                        </td>
                    </tr>
                `;
                }).join('');
            
            // 更新全选复选框状态
            updateSelectAllCheckboxState();
            }

            // 更新底部分页文字
            const totalTextEl = document.getElementById('testcase-total-text');
            const pageInput = document.getElementById('testcase-current-page-input');
            const totalPagesEl = document.getElementById('testcase-total-pages');
            if (totalTextEl) totalTextEl.textContent = `共 ${total} 条`;
            if (pageInput) pageInput.value = testcaseCurrentPage;
            if (totalPagesEl) totalPagesEl.textContent = totalPages;
        }

        // 前往指定页
        function goTestcasePage() {
            const input = document.getElementById('testcase-current-page-input');
            if (!input) return;
            let page = parseInt(input.value, 10);
            const total = currentTestCases.length;
            const totalPages = total === 0 ? 1 : Math.ceil(total / testcasePageSize);
            if (isNaN(page) || page < 1) page = 1;
            if (page > totalPages) page = totalPages;
            testcaseCurrentPage = page;
            renderPagedTestCases();
        }

        // 全选所有页

            if (menu) menu.classList.remove('show');

        // 更新全选复选框状态
        function updateSelectAllCheckboxState() {
            const selectAll = document.getElementById('select-all-testcases');
            if (!selectAll) return;
            
            // 检查当前页是否全部选中
            const currentPageCheckboxes = document.querySelectorAll('#testcase-table-body .testcase-checkbox');
            const allCurrentPageSelected = currentPageCheckboxes.length > 0 && 
                Array.from(currentPageCheckboxes).every(cb => cb.checked);
            
            // 检查所有页是否全部选中
            const allPagesSelected = currentTestCases.length > 0 && 
                currentTestCases.every(tc => selectedTestcaseIds.has(String(tc.id)));
            
            // 如果所有页都选中，复选框为选中状态；如果只是当前页选中，为不确定状态
            selectAll.checked = allPagesSelected;
            selectAll.indeterminate = !allPagesSelected && allCurrentPageSelected;
        }

        // 单个用例复选框变化时更新状态
        function onTestcaseCheckboxChange(checkbox) {
            const testcaseId = checkbox.dataset.id;
            if (checkbox.checked) {
                selectedTestcaseIds.add(testcaseId);
            } else {
                selectedTestcaseIds.delete(testcaseId);
            }
            updateSelectAllCheckboxState();
        }

        // 当前选中的功能测试项目
        let selectedFunctionalProject = null;

        // 加载功能测试项目列表
        async function loadFunctionalProjects() {
            try {
                const response = await fetch('/api/functional/projects');
                const data = await response.json();
                if (data.error) {

                // 更新下拉选择框

                        functionalProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

        function clearFunctionalProject(event) {

            updatePageTitle();

                '<p style="color: #999; grid-column: 1 / -1; padding: 20px; text-align: center;">请先选择项目和设备</p>';
            
            // 清空设备下拉框
            document.getElementById('functional-device-android').innerHTML = '<option value="">请选择设备型号</option>';
            document.getElementById('functional-device-ios').innerHTML = '<option value="">请选择设备型号</option>';

            renderFunctionalProjectsMenu();

        // 功能测试状态
        let functionalTestStatus = 'idle'; // 'idle' | 'running'
        let functionalTestTaskId = null;
        let functionalTestStatusInterval = null;

        // 切换功能测试状态（启动/结束）
        async function toggleFunctionalTest(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            
            console.log('toggleFunctionalTest 被调用, 当前状态:', functionalTestStatus);
            const btn = document.getElementById('functional-test-btn');
            
            if (!btn) {
                console.error('找不到 functional-test-btn 按钮');
                return;
            }
            
            if (btn.disabled) {
                console.log('按钮已被禁用，忽略点击');
                return;
            }
            
            if (functionalTestStatus === 'idle') {
                // 启动测试
                console.log('准备启动测试...');
                await startFunctionalTest(event);
            } else {
                // 结束测试
                console.log('准备结束测试...');
                await stopFunctionalTest(event);
            }
        }

        // 启动功能测试
        async function startFunctionalTest(event) {
            console.log('startFunctionalTest 开始执行');
            const btn = document.getElementById('functional-test-btn');
            
            if (!btn) {
                console.error('找不到 functional-test-btn 按钮');
                return;
            }
            
            try {
                console.log('开始验证必填项...');
                // 验证必填项
                if (!selectedFunctionalProject) {
                    showFunctionalAlert('请选择项目', 'error');
                    return;
                }
                
                const androidChecked = document.getElementById('platform-android-check').checked;
                const iosChecked = document.getElementById('platform-ios-check').checked;
                const androidDevice = document.getElementById('functional-device-android').value;
                const iosDevice = document.getElementById('functional-device-ios').value;
                
                if (!androidChecked && !iosChecked) {
                    showFunctionalAlert('请至少勾选一个平台', 'error');
                    return;
                }
                
                if ((androidChecked && !androidDevice) || (iosChecked && !iosDevice)) {
                    showFunctionalAlert('请为已勾选的平台选择设备型号', 'error');
                    return;
                }
                
                // 从跨页选中状态获取所有选中的用例
                const selectedModules = currentTestCases
                    .filter(tc => selectedTestcaseIds.has(String(tc.id)))
                    .map(tc => ({
                        id: String(tc.id),
                        module: tc.module || ''
                    }));
                
                if (selectedModules.length === 0) {
                    showFunctionalAlert('请至少选择一个模块', 'error');
                    return;
                }
                
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span> 启动中...';
                
                // 收集表单数据
                const testConfig = {
                    project: selectedFunctionalProject,
                    android_device: androidDevice,
                    ios_device: iosDevice,
                    modules: selectedModules,
                    firmware: document.getElementById('functional-firmware').value,
                    shell: document.getElementById('functional-shell').value,
                    plugin: document.getElementById('functional-plugin').value
                };
                
                // 发送测试请求到后端
                console.log('发送测试配置:', testConfig);
                const response = await fetch('/api/functional/test/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testConfig)
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: `HTTP ${response.status}: ${response.statusText}` }));
                    throw new Error(errorData.error || '启动失败');
                }
                
                const data = await response.json();
                console.log('后端响应:', data);
                if (!data.success) {
                    throw new Error(data.error || '启动失败');
                }
                
                // 更新状态
                functionalTestStatus = 'running';
                functionalTestTaskId = data.task_id;
                
                // 更新按钮状态
                btn.disabled = false;
                btn.classList.remove('btn-success');
                btn.classList.add('btn-danger');
                btn.innerHTML = '结束测试';
                
                // 禁用表单输入
                disableFunctionalForm(true);
                
                showFunctionalAlert('测试已启动', 'success');
                
                // 开始轮询测试状态（每2秒检查一次）
                if (functionalTestStatusInterval) {
                    clearInterval(functionalTestStatusInterval);
                }
                functionalTestStatusInterval = setInterval(checkFunctionalTestStatus, 2000);
                
            } catch (error) {
                showFunctionalAlert('启动失败: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '启动测试';
            }
        }

        // 结束功能测试
        async function stopFunctionalTest(event) {
            const btn = document.getElementById('functional-test-btn');
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span> 停止中...';
                
                // 发送停止测试请求到后端
                if (functionalTestTaskId) {
                    const response = await fetch(`/api/functional/test/stop/${functionalTestTaskId}`, { method: 'POST' });
                    const data = await response.json();
                    if (!data.success) {
                        throw new Error(data.error || '停止失败');
                    }
                }
                
                // 更新状态
                functionalTestStatus = 'idle';
                functionalTestTaskId = null;
                
                // 更新按钮状态
                btn.disabled = false;
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-success');
                btn.innerHTML = '启动测试';
                
                // 启用表单输入
                disableFunctionalForm(false);
                
                showFunctionalAlert('测试已停止', 'info');
                
                // 停止状态轮询
                if (functionalTestStatusInterval) {
                    clearInterval(functionalTestStatusInterval);
                    functionalTestStatusInterval = null;
                }
                
            } catch (error) {
                showFunctionalAlert('停止失败: ' + error.message, 'error');
                btn.disabled = false;
            }
        }

        // 检查功能测试状态
        async function checkFunctionalTestStatus() {
            if (!functionalTestTaskId) return;
            
            try {
                const response = await fetch(`/api/functional/test/status/${functionalTestTaskId}`);
                const data = await response.json();
                
                if (data.status === 'completed' || data.status === 'failed' || data.status === 'stopped') {
                    // 测试结束
                    functionalTestStatus = 'idle';
                    functionalTestTaskId = null;
                    
                    // 更新按钮状态
                    const btn = document.getElementById('functional-test-btn');
                    if (btn) {
                        btn.disabled = false;
                        btn.classList.remove('btn-danger');
                        btn.classList.add('btn-success');
                        btn.innerHTML = '启动测试';
                    }
                    
                    // 启用表单输入
                    disableFunctionalForm(false);
                    
                    // 显示结果
                    if (data.status === 'completed') {
                        showFunctionalAlert('测试已完成', 'success');
                    } else if (data.status === 'failed') {
                        showFunctionalAlert('测试失败: ' + (data.error || '未知错误'), 'error');
                    } else {
                        showFunctionalAlert('测试已停止', 'info');
                    }
                    
                    // 停止轮询
                    if (functionalTestStatusInterval) {
                        clearInterval(functionalTestStatusInterval);
                        functionalTestStatusInterval = null;
                    }
                }
            } catch (error) {
                console.error('检查测试状态失败:', error);
            }
        }

        // 禁用/启用功能测试表单
        function disableFunctionalForm(disabled) {
            const androidSelect = document.getElementById('functional-device-android');
            const iosSelect = document.getElementById('functional-device-ios');
            const firmwareInput = document.getElementById('functional-firmware');
            const shellInput = document.getElementById('functional-shell');
            const pluginInput = document.getElementById('functional-plugin');
            const moduleCheckboxes = document.querySelectorAll('#functional-modules-container input[type="checkbox"]');
            
            [androidSelect, iosSelect, firmwareInput, shellInput, pluginInput].forEach(el => {
                if (el) el.disabled = disabled;
            });
            
            moduleCheckboxes.forEach(cb => {
                cb.disabled = disabled;
            });
        }

        // 重置功能测试表单
        function resetFunctionalForm() {
            // 如果测试正在运行，先停止
            if (functionalTestStatus === 'running') {
                if (confirm('测试正在运行，确定要重置表单吗？这将停止当前测试。')) {
                    stopFunctionalTest(null);
                } else {
                    return;
                }
            }
            
            // 重置平台复选框
            document.getElementById('platform-android-check').checked = false;
            document.getElementById('platform-ios-check').checked = false;
            
            // 重置设备选择
            document.getElementById('functional-device-android').value = '';
            document.getElementById('functional-device-android').disabled = true;
            document.getElementById('functional-device-ios').value = '';
            document.getElementById('functional-device-ios').disabled = true;
            
            // 重置版本输入
            document.getElementById('functional-firmware').value = '';
            document.getElementById('functional-shell').value = '';
            document.getElementById('functional-plugin').value = '';
            
            // 重置测试用例
            selectedTestcaseIds.clear(); // 清空跨页选中状态
            renderModuleTree();
            renderTestCases([]);
            
            // 重置所有测试用例复选框
            document.querySelectorAll('#testcase-table-body .testcase-checkbox').forEach(cb => {
                cb.checked = false;
            });
            const selectAll = document.getElementById('select-all-testcases');
            if (selectAll) {
                selectAll.checked = false;
                selectAll.indeterminate = false;
            }
        }

        // 显示功能测试提示信息
        function showFunctionalAlert(message, type) {
            const container = document.getElementById('functional-alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            container.style.display = 'block';

            setTimeout(() => {
                container.style.display = 'none';
            }, 5000);
        }

        // 页面加载时初始化（记住上次停留的页面）
        window.addEventListener('DOMContentLoaded', () => {
            // 初始化版本历史记录
            initVersionHistory();

            // 初始化其他标签页的数据（但不显示）
            loadConfig();

            // 读取上次停留的标签页，默认功能测试
            const lastTab = localStorage.getItem('lastActiveTab') || 'functional';

             // 根据上次停留的页面决定是否自动选中功能测试项目
             autoSelectFunctionalProject = (lastTab === 'functional');
             // 始终加载功能测试项目，用于左侧下拉显示 APP(new)
             loadFunctionalProjects();

            // 如果是测试工具页面，需要传入子菜单参数
            if (lastTab === 'tools') {
                const lastSubsection = localStorage.getItem('lastActiveSubsection') || 'port-settings';
                switchTab(lastTab, null, lastSubsection);
            } else {
                switchTab(lastTab, null);
            } 
        });

        // 加载任务状态
        async function loadTaskStatus() {
            const container = document.getElementById('task-status-container');
            if (!container) return;
            
            try {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">加载中...</div>';
                
                const response = await fetch('/api/tasks/list');
                const data = await response.json();
                
                if (data.error) {
                    container.innerHTML = `<div style="text-align: center; padding: 20px; color: #ef4444;">加载失败: ${data.error}</div>`;
                    return;
                }
                
                const tasks = data.tasks || [];
                
                if (tasks.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无任务</div>';
                    return;
                }
                
                // 渲染任务列表
                container.innerHTML = `
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                            <thead>
                                <tr style="background-color: #f5f5f5; border-bottom: 2px solid #e5e5e5;">
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">任务ID</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">类型</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">状态</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">开始时间</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">结束时间</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">详情</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tasks.map(task => {
                                    const statusColors = {
                                        'running': '#10b981',
                                        'completed': '#3b82f6',
                                        'failed': '#ef4444',
                                        'stopped': '#f59e0b',
                                        'idle': '#6b7280'
                                    };
                                    const statusTexts = {
                                        'running': '运行中',
                                        'completed': '已完成',
                                        'failed': '失败',
                                        'stopped': '已停止',
                                        'idle': '空闲'
                                    };
                                    const statusColor = statusColors[task.status] || '#6b7280';
                                    const statusText = statusTexts[task.status] || task.status;
                                    
                                    let details = '';
                                    if (task.type === '功能测试') {
                                        details = `项目: ${task.project_id || 'N/A'}<br>`;
                                        if (task.android_device) details += `Android: ${task.android_device}<br>`;
                                        if (task.ios_device) details += `iOS: ${task.ios_device}<br>`;
                                        details += `用例数: ${task.testcase_count || 0}`;
                                    } else {
                                        details = `平台: ${(task.platforms || []).join(', ') || 'N/A'}<br>`;
                                        details += `设备数: ${(task.devices || []).length || 0}`;
                                    }
                                    
                                    return `
                                        <tr style="border-bottom: 1px solid #e5e5e5;">
                                            <td style="padding: 12px; color: #333;">${task.task_id}</td>
                                            <td style="padding: 12px; color: #333;">${task.type}</td>
                                            <td style="padding: 12px;">
                                                <span style="display: inline-block; padding: 4px 8px; border-radius: 4px; background-color: ${statusColor}20; color: ${statusColor}; font-size: 12px;">
                                                    ${statusText}
                                                </span>
                                            </td>
                                            <td style="padding: 12px; color: #666; font-size: 13px;">${task.start_time ? new Date(task.start_time).toLocaleString('zh-CN') : 'N/A'}</td>
                                            <td style="padding: 12px; color: #666; font-size: 13px;">${task.end_time ? new Date(task.end_time).toLocaleString('zh-CN') : '-'}</td>
                                            <td style="padding: 12px; color: #666; font-size: 12px;">${details}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div style="text-align: center; padding: 20px; color: #ef4444;">加载失败: ${error.message}</div>`;
            }
        }

        // 刷新任务状态
        function refreshTaskStatus() {
            loadTaskStatus();
        }

        // 加载测试报告
        async function loadTestReports() {
            const container = document.getElementById('test-reports-container');
            if (!container) return;
            
            try {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">加载中...</div>';
                
                const response = await fetch('/api/functional/test/reports');
                const data = await response.json();
                
                if (data.error) {
                    container.innerHTML = `<div style="text-align: center; padding: 20px; color: #ef4444;">加载失败: ${data.error}</div>`;
                    return;
                }
                
                const reports = data.reports || [];
                
                if (reports.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无测试报告</div>';
                    return;
                }
                
                // 渲染报告列表
                container.innerHTML = `
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                            <thead>
                                <tr style="background-color: #f5f5f5; border-bottom: 2px solid #e5e5e5;">
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">任务ID</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">项目</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">状态</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">设备</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">用例数</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">完成时间</th>
                                    <th style="padding: 12px; text-align: left; font-weight: 500; color: #333;">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${reports.map(report => {
                                    const statusColors = {
                                        'completed': '#3b82f6',
                                        'failed': '#ef4444'
                                    };
                                    const statusTexts = {
                                        'completed': '成功',
                                        'failed': '失败'
                                    };
                                    const statusColor = statusColors[report.status] || '#6b7280';
                                    const statusText = statusTexts[report.status] || report.status;
                                    
                                    const devices = [];
                                    if (report.android_device) devices.push(`Android: ${report.android_device}`);
                                    if (report.ios_device) devices.push(`iOS: ${report.ios_device}`);
                                    const deviceText = devices.join('<br>') || 'N/A';
                                    
                                    return `
                                        <tr style="border-bottom: 1px solid #e5e5e5;">
                                            <td style="padding: 12px; color: #333;">${report.task_id}</td>
                                            <td style="padding: 12px; color: #333;">${report.project_id || 'N/A'}</td>
                                            <td style="padding: 12px;">
                                                <span style="display: inline-block; padding: 4px 8px; border-radius: 4px; background-color: ${statusColor}20; color: ${statusColor}; font-size: 12px;">
                                                    ${statusText}
                                                </span>
                                            </td>
                                            <td style="padding: 12px; color: #666; font-size: 12px;">${deviceText}</td>
                                            <td style="padding: 12px; color: #666;">${report.testcase_count || 0}</td>
                                            <td style="padding: 12px; color: #666; font-size: 13px;">${report.end_time ? new Date(report.end_time).toLocaleString('zh-CN') : '-'}</td>
                                            <td style="padding: 12px;">
                                                <button class="btn btn-secondary btn-small" onclick="viewReportDetail('${report.task_id}')" style="white-space: nowrap;">查看详情</button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div style="text-align: center; padding: 20px; color: #ef4444;">加载失败: ${error.message}</div>`;
            }
        }

        // 刷新测试报告
        function refreshTestReports() {
            loadTestReports();
        }

        // 查看报告详情
        async function viewReportDetail(taskId) {
            try {
                const response = await fetch(`/api/functional/test/status/${taskId}`);
                const data = await response.json();
                
                if (data.error) {
                    alert('获取报告详情失败: ' + data.error);
                    return;
                }
                
                // 创建详情弹窗
                const modal = document.createElement('div');
                modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;';
                modal.innerHTML = `
                    <div style="background: white; border-radius: 8px; padding: 24px; max-width: 800px; max-height: 80vh; overflow-y: auto; width: 90%;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="margin: 0; font-size: 18px; color: #333;">测试报告详情 - ${taskId}</h3>
                            <button onclick="this.closest('div[style*=\"position: fixed\"]').remove()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">×</button>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <strong>项目:</strong> ${data.project_id || 'N/A'}<br>
                            <strong>状态:</strong> ${data.status || 'N/A'}<br>
                            <strong>开始时间:</strong> ${data.start_time ? new Date(data.start_time).toLocaleString('zh-CN') : 'N/A'}<br>
                            <strong>结束时间:</strong> ${data.end_time ? new Date(data.end_time).toLocaleString('zh-CN') : '-'}<br>
                            ${data.android_device ? `<strong>Android设备:</strong> ${data.android_device}<br>` : ''}
                            ${data.ios_device ? `<strong>iOS设备:</strong> ${data.ios_device}<br>` : ''}
                            <strong>测试用例数:</strong> ${(data.testcase_ids || []).length}
                        </div>
                        ${data.output ? `
                            <div style="margin-top: 20px;">
                                <strong>测试输出:</strong>
                                <pre style="background: #f5f5f5; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 12px; max-height: 400px; overflow-y: auto;">${data.output}</pre>
                            </div>
                        ` : ''}
                        ${data.error ? `
                            <div style="margin-top: 20px; color: #ef4444;">
                                <strong>错误信息:</strong> ${data.error}
                            </div>
                        ` : ''}
                    </div>
                `;
                document.body.appendChild(modal);
                
                // 点击背景关闭
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.remove();
                    }
                });
            } catch (error) {
                alert('获取报告详情失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
